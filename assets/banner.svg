<svg width="880" height="230" viewBox="0 0 880 230" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="880" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1a1027"/>
      <stop offset="0.55" stop-color="#2b1017"/>
      <stop offset="1" stop-color="#3d1408"/>
    </linearGradient>
    <linearGradient id="flame" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#ffd166"/>
      <stop offset="0.5" stop-color="#ff7b3d"/>
      <stop offset="1" stop-color="#f43f2e"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffb26b"/>
      <stop offset="0.5" stop-color="#ff5d3d"/>
      <stop offset="1" stop-color="#ffb26b"/>
      <animate attributeName="x1" values="0;-1;0" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1;2;1" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.6" r="0.6">
      <stop offset="0" stop-color="#ff7b3d" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ff7b3d" stop-opacity="0"/>
    </radialGradient>
    <style>
      .flicker { transform-origin: 124px 154px; animation: flick 2.4s ease-in-out infinite; }
      .inner   { transform-origin: 124px 154px; animation: flick 1.7s ease-in-out infinite reverse; }
      .glowp   { animation: pulse 3.2s ease-in-out infinite; }
      .shim1   { animation: drift 5s linear infinite; }
      .shim2   { animation: drift 7s linear infinite reverse; }
      .spark   { animation: rise 4s ease-in infinite; }
      .spark2  { animation: rise 4s ease-in 1.3s infinite; }
      .spark3  { animation: rise 4s ease-in 2.6s infinite; }
      @keyframes flick {
        0%,100% { transform: scaleY(1) scaleX(1); }
        30%     { transform: scaleY(1.045) scaleX(0.985); }
        60%     { transform: scaleY(0.97) scaleX(1.015); }
        80%     { transform: scaleY(1.025) scaleX(0.99); }
      }
      @keyframes pulse { 0%,100% { opacity: .55; } 50% { opacity: 1; } }
      @keyframes drift { from { transform: translateX(0); } to { transform: translateX(-120px); } }
      @keyframes rise {
        0%   { transform: translateY(0);    opacity: 0; }
        15%  { opacity: .9; }
        70%  { opacity: .35; }
        100% { transform: translateY(-92px); opacity: 0; }
      }
    </style>
  </defs>
  <rect width="880" height="230" rx="18" fill="url(#bg)"/>
  <!-- warm glow behind flame -->
  <circle class="glowp" cx="124" cy="128" r="110" fill="url(#glow)"/>
  <!-- heat shimmer lines -->
  <g stroke="#ff7b3d" stroke-opacity="0.18" stroke-width="2" fill="none">
    <path class="shim1" d="M-80 190 q30 -14 60 0 t60 0 t60 0 t60 0 t60 0 t60 0 t60 0 t60 0 t60 0 t60 0 t60 0 t60 0 t60 0 t60 0 t60 0 t60 0 t60 0 t60 0"/>
    <path class="shim2" d="M-80 205 q30 -10 60 0 t60 0 t60 0 t60 0 t60 0 t60 0 t60 0 t60 0 t60 0 t60 0 t60 0 t60 0 t60 0 t60 0 t60 0 t60 0 t60 0 t60 0" stroke-opacity="0.10"/>
  </g>
  <!-- sparks -->
  <g fill="#ffd166">
    <circle class="spark"  cx="98"  cy="70" r="2.2"/>
    <circle class="spark2" cx="140" cy="64" r="1.8"/>
    <circle class="spark3" cx="118" cy="74" r="1.5"/>
  </g>
  <!-- flame mark -->
  <g transform="translate(84,44)">
    <g class="flicker">
      <path d="M46 0 C52 26 78 34 78 66 C78 92 60 110 40 110 C20 110 2 92 2 66 C2 50 10 40 18 30 C18 46 26 52 32 52 C28 34 34 14 46 0 Z" fill="url(#flame)"/>
    </g>
    <g class="inner">
      <path d="M40 62 C48 74 54 80 54 92 C54 103 47 110 40 110 C33 110 26 103 26 92 C26 82 32 74 40 62 Z" fill="#fff3d6" fill-opacity="0.92"/>
    </g>
  </g>
  <!-- wordmark -->
  <text x="200" y="112" font-family="Avenir Next, Segoe UI, Helvetica, Arial, sans-serif" font-size="64" font-weight="800" letter-spacing="6" fill="url(#wordmark)">HEATWAVE</text>
  <text x="203" y="152" font-family="Avenir Next, Segoe UI, Helvetica, Arial, sans-serif" font-size="21" font-weight="500" fill="#f5d8c4" fill-opacity="0.92">A verification protocol for AI-written code</text>
  <text x="203" y="182" font-family="Avenir Next, Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="400" fill="#caa895" fill-opacity="0.85">plan · build · review · prove — in a loop that never silently restarts</text>
</svg>
