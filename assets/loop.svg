<svg width="920" height="470" viewBox="0 0 920 470" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Avenir Next, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="920" y2="470" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#141022"/>
      <stop offset="1" stop-color="#221018"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#8f86a8"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#f43f5e"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#34d399"/>
    </marker>
  </defs>
  <style>
    .flow  { stroke-dasharray: 6 5; animation: dashflow 1.2s linear infinite; }
    .flowS { stroke-dasharray: 4 3; animation: dashflow 1.6s linear infinite; }
    .nodeglow { animation: nodepulse 3s ease-in-out infinite; }
    @keyframes dashflow  { to { stroke-dashoffset: -11; } }
    @keyframes nodepulse { 0%,100% { fill-opacity: 0.18; } 50% { fill-opacity: 0.34; } }
  </style>
  <rect width="920" height="470" rx="16" fill="url(#card)"/>
  <text x="34" y="46" font-size="19" font-weight="700" fill="#e9e2f7">The Heatwave loop</text>
  <text x="34" y="70" font-size="13" fill="#9a8fb8">every arrow produces an artifact on disk · every loop has a budget · state survives any restart</text>

  <!-- Row 1: planning -->
  <g>
    <rect x="34" y="100" width="150" height="52" rx="10" fill="#3b82f6" fill-opacity="0.16" stroke="#3b82f6" stroke-width="1.6"/>
    <text x="109" y="123" font-size="14" font-weight="700" fill="#93c5fd" text-anchor="middle">PLANNING</text>
    <text x="109" y="141" font-size="11" fill="#7ea8dd" text-anchor="middle">🧠 planner</text>

    <rect x="250" y="100" width="160" height="52" rx="10" fill="#a855f7" fill-opacity="0.16" stroke="#a855f7" stroke-width="1.6"/>
    <text x="330" y="123" font-size="14" font-weight="700" fill="#d8b4fe" text-anchor="middle">PLAN_REVIEW</text>
    <text x="330" y="141" font-size="11" fill="#b490d8" text-anchor="middle">🔍 reviewer</text>

    <rect x="476" y="100" width="170" height="52" rx="10" fill="#f97316" fill-opacity="0.18" stroke="#f97316" stroke-width="1.6"/>
    <text x="561" y="123" font-size="14" font-weight="700" fill="#fdba74" text-anchor="middle">IMPLEMENTING</text>
    <text x="561" y="141" font-size="11" fill="#e09a5e" text-anchor="middle">🔨 implementer + 🦥 ponytail</text>

    <rect x="712" y="100" width="160" height="52" rx="10" fill="#a855f7" fill-opacity="0.16" stroke="#a855f7" stroke-width="1.6"/>
    <text x="792" y="123" font-size="14" font-weight="700" fill="#d8b4fe" text-anchor="middle">FULL_REVIEW</text>
    <text x="792" y="141" font-size="11" fill="#b490d8" text-anchor="middle">🔍 reviewer</text>
  </g>

  <line x1="184" y1="126" x2="248" y2="126" stroke="#8f86a8" stroke-width="1.6" marker-end="url(#arr)" class="flow"/>
  <text x="216" y="118" font-size="10" fill="#8f86a8" text-anchor="middle">plan doc</text>
  <line x1="410" y1="126" x2="474" y2="126" stroke="#34d399" stroke-width="1.6" marker-end="url(#arrGreen)" class="flow"/>
  <text x="442" y="118" font-size="10" fill="#34d399" text-anchor="middle">approved</text>
  <line x1="646" y1="126" x2="710" y2="126" stroke="#8f86a8" stroke-width="1.6" marker-end="url(#arr)" class="flow"/>
  <text x="678" y="118" font-size="10" fill="#8f86a8" text-anchor="middle">package</text>

  <!-- reject loop back -->
  <path d="M330 100 C330 64 109 64 109 98" stroke="#f43f5e" stroke-width="1.4" fill="none" marker-end="url(#arrRed)" class="flowS"/>
  <text x="219" y="72" font-size="10" fill="#f43f5e" text-anchor="middle">rejected · budget 3</text>

  <!-- Row 2: fix loop -->
  <g>
    <rect x="712" y="220" width="160" height="52" rx="10" fill="#eab308" fill-opacity="0.14" stroke="#eab308" stroke-width="1.6"/>
    <text x="792" y="243" font-size="14" font-weight="700" fill="#fde68a" text-anchor="middle">FIXING</text>
    <text x="792" y="261" font-size="11" fill="#cdb35e" text-anchor="middle">🔨 implementer + evidence</text>

    <rect x="440" y="220" width="200" height="52" rx="10" fill="#a855f7" fill-opacity="0.16" stroke="#a855f7" stroke-width="1.6"/>
    <text x="540" y="243" font-size="14" font-weight="700" fill="#d8b4fe" text-anchor="middle">TARGETED_REVIEW</text>
    <text x="540" y="261" font-size="11" fill="#b490d8" text-anchor="middle">🔍 reviewer · budget 5</text>
  </g>

  <line x1="792" y1="152" x2="792" y2="218" stroke="#f43f5e" stroke-width="1.4" marker-end="url(#arrRed)" class="flowS"/>
  <text x="800" y="190" font-size="10" fill="#f43f5e">findings</text>
  <line x1="710" y1="246" x2="642" y2="246" stroke="#8f86a8" stroke-width="1.6" marker-end="url(#arr)" class="flow"/>
  <text x="676" y="238" font-size="10" fill="#8f86a8" text-anchor="middle">fix report</text>
  <path d="M540 220 C540 196 700 196 740 218" stroke="#f43f5e" stroke-width="1.4" fill="none" marker-end="url(#arrRed)" class="flowS"/>
  <text x="628" y="196" font-size="10" fill="#f43f5e" text-anchor="middle">still failing</text>

  <!-- Row 3: final -->
  <g>
    <rect x="140" y="330" width="170" height="52" rx="10" fill="#a855f7" fill-opacity="0.16" stroke="#a855f7" stroke-width="1.6"/>
    <text x="225" y="353" font-size="14" font-weight="700" fill="#d8b4fe" text-anchor="middle">FINAL_REVIEW</text>
    <text x="225" y="371" font-size="11" fill="#b490d8" text-anchor="middle">🔍 per-AC status + checklist</text>

    <rect x="420" y="330" width="160" height="52" rx="10" fill="#10b981" fill-opacity="0.18" stroke="#10b981" stroke-width="1.8" class="nodeglow"/>
    <text x="500" y="353" font-size="15" font-weight="800" fill="#6ee7b7" text-anchor="middle">APPROVED ✓</text>
    <text x="500" y="371" font-size="11" fill="#5ebd9a" text-anchor="middle">0 Blockers · 0 Majors · evidence</text>

    <rect x="660" y="330" width="212" height="52" rx="10" fill="#64748b" fill-opacity="0.14" stroke="#64748b" stroke-width="1.4"/>
    <text x="766" y="353" font-size="13" font-weight="700" fill="#cbd5e1" text-anchor="middle">ESCALATED → 👤 you</text>
    <text x="766" y="371" font-size="11" fill="#94a3b8" text-anchor="middle">any budget exhausted · one question</text>
  </g>

  <path d="M440 246 C300 246 225 280 225 328" stroke="#34d399" stroke-width="1.6" fill="none" marker-end="url(#arrGreen)" class="flow"/>
  <text x="300" y="290" font-size="10" fill="#34d399" text-anchor="middle">gate met</text>
  <line x1="310" y1="356" x2="418" y2="356" stroke="#34d399" stroke-width="1.8" marker-end="url(#arrGreen)" class="flow"/>
  <text x="364" y="348" font-size="10" fill="#34d399" text-anchor="middle">gate met</text>
  <path d="M225 330 C240 300 680 288 792 274" stroke="#f43f5e" stroke-width="1.4" fill="none" marker-end="url(#arrRed)" class="flowS"/>
  <text x="520" y="302" font-size="10" fill="#f43f5e" text-anchor="middle">findings · budget 2 · next review is FULL</text>

  <!-- state file footer -->
  <rect x="34" y="416" width="838" height="34" rx="8" fill="#0d0a18" stroke="#3f3357" stroke-width="1"/>
  <text x="52" y="438" font-size="12.5" font-family="SF Mono, Menlo, Consolas, monospace" fill="#a78bfa">.heatwave/runs/&lt;task&gt;/state.yaml</text>
  <text x="330" y="438" font-size="12.5" font-family="SF Mono, Menlo, Consolas, monospace" fill="#8f86a8">— every transition lands here first. Kill the session anywhere; any tool resumes exactly here.</text>
</svg>
