<svg width="920" height="360" viewBox="0 0 920 360" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Avenir Next, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="920" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#141022"/>
      <stop offset="1" stop-color="#221018"/>
    </linearGradient>
    <marker id="fwd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#b9aed4"/>
    </marker>
    <marker id="back" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#f43f5e"/>
    </marker>
    <style>
      .flow  { stroke-dasharray: 7 5; animation: dash 1.1s linear infinite; }
      .retry { stroke-dasharray: 4 4; animation: dash 1.7s linear infinite; }
      .ok    { animation: pulse 2.6s ease-in-out infinite; }
      @keyframes dash  { to { stroke-dashoffset: -12; } }
      @keyframes pulse { 0%,100% { fill-opacity: 0.16; } 50% { fill-opacity: 0.38; } }
    </style>
  </defs>
  <rect width="920" height="360" rx="16" fill="url(#card)"/>

  <text x="36" y="48" font-size="20" font-weight="700" fill="#efe9fb">How Heatwave runs your task</text>
  <text x="36" y="72" font-size="13.5" fill="#9a8fb8">every arrow writes a file to your repo — so progress is never lost, and every claim leaves evidence</text>

  <!-- 5 stages, one clean row -->
  <!-- 1 PLAN -->
  <g>
    <rect x="36" y="118" width="150" height="74" rx="12" fill="#3b82f6" fill-opacity="0.15" stroke="#3b82f6" stroke-width="1.8"/>
    <text x="111" y="147" font-size="16" font-weight="700" fill="#a9cdfb" text-anchor="middle">1 · PLAN</text>
    <text x="111" y="167" font-size="12" fill="#7ea8dd" text-anchor="middle">🧠 what to build,</text>
    <text x="111" y="182" font-size="12" fill="#7ea8dd" text-anchor="middle">how to prove it</text>
  </g>
  <line x1="186" y1="155" x2="220" y2="155" stroke="#b9aed4" stroke-width="2" marker-end="url(#fwd)" class="flow"/>

  <!-- 2 REVIEW PLAN -->
  <g>
    <rect x="222" y="118" width="150" height="74" rx="12" fill="#a855f7" fill-opacity="0.15" stroke="#a855f7" stroke-width="1.8"/>
    <text x="297" y="147" font-size="16" font-weight="700" fill="#dcbdfd" text-anchor="middle">2 · CHECK PLAN</text>
    <text x="297" y="167" font-size="12" fill="#b490d8" text-anchor="middle">🔍 a second AI</text>
    <text x="297" y="182" font-size="12" fill="#b490d8" text-anchor="middle">judges the plan</text>
  </g>
  <line x1="372" y1="155" x2="406" y2="155" stroke="#b9aed4" stroke-width="2" marker-end="url(#fwd)" class="flow"/>

  <!-- 3 BUILD -->
  <g>
    <rect x="408" y="118" width="150" height="74" rx="12" fill="#f97316" fill-opacity="0.16" stroke="#f97316" stroke-width="1.8"/>
    <text x="483" y="147" font-size="16" font-weight="700" fill="#fdc38f" text-anchor="middle">3 · BUILD</text>
    <text x="483" y="167" font-size="12" fill="#e09a5e" text-anchor="middle">🔨 smallest code that</text>
    <text x="483" y="182" font-size="12" fill="#e09a5e" text-anchor="middle">meets the plan</text>
  </g>
  <line x1="558" y1="155" x2="592" y2="155" stroke="#b9aed4" stroke-width="2" marker-end="url(#fwd)" class="flow"/>

  <!-- 4 REVIEW & FIX -->
  <g>
    <rect x="594" y="118" width="150" height="74" rx="12" fill="#a855f7" fill-opacity="0.15" stroke="#a855f7" stroke-width="1.8"/>
    <text x="669" y="147" font-size="16" font-weight="700" fill="#dcbdfd" text-anchor="middle">4 · CHECK &amp; FIX</text>
    <text x="669" y="167" font-size="12" fill="#b490d8" text-anchor="middle">🔍 findings fixed with</text>
    <text x="669" y="182" font-size="12" fill="#b490d8" text-anchor="middle">proof, until clean</text>
  </g>
  <line x1="744" y1="155" x2="778" y2="155" stroke="#34d399" stroke-width="2.2" marker-end="url(#fwd)" class="flow"/>

  <!-- 5 APPROVED -->
  <g>
    <rect x="780" y="118" width="104" height="74" rx="12" fill="#10b981" fill-opacity="0.16" stroke="#10b981" stroke-width="2" class="ok"/>
    <text x="832" y="150" font-size="16" font-weight="800" fill="#7df0c3" text-anchor="middle">✅ DONE</text>
    <text x="832" y="170" font-size="11.5" fill="#5ebd9a" text-anchor="middle">every criterion</text>
    <text x="832" y="184" font-size="11.5" fill="#5ebd9a" text-anchor="middle">proven</text>
  </g>

  <!-- retry arcs -->
  <path d="M275 118 C255 84 155 84 133 116" stroke="#f43f5e" stroke-width="1.6" fill="none" marker-end="url(#back)" class="retry"/>
  <text x="204" y="88" font-size="11.5" fill="#f77" text-anchor="middle">plan not good enough? redo it</text>
  <path d="M647 118 C627 84 527 84 505 116" stroke="#f43f5e" stroke-width="1.6" fill="none" marker-end="url(#back)" class="retry"/>
  <text x="576" y="88" font-size="11.5" fill="#f77" text-anchor="middle">problems found? fix them</text>

  <!-- captions under stages -->
  <text x="297" y="218" font-size="11.5" fill="#8f86a8" text-anchor="middle">no code exists yet ⟵ plan must pass first</text>
  <text x="669" y="218" font-size="11.5" fill="#8f86a8" text-anchor="middle">"fixed" needs attached test output, not promises</text>

  <!-- guarantees strip -->
  <g>
    <rect x="36" y="244" width="424" height="48" rx="10" fill="#0d0a18" stroke="#3f3357" stroke-width="1"/>
    <text x="54" y="264" font-size="12.5" font-weight="700" fill="#c9bfe4">🔁 Runs non-stop</text>
    <text x="54" y="281" font-size="11.5" fill="#8f86a8">only interrupts you if it's done, or truly needs your decision</text>
    <rect x="472" y="244" width="412" height="48" rx="10" fill="#0d0a18" stroke="#3f3357" stroke-width="1"/>
    <text x="490" y="264" font-size="12.5" font-weight="700" fill="#c9bfe4">💾 Never loses progress</text>
    <text x="490" y="281" font-size="11.5" fill="#8f86a8">each step saved to your repo first — any session resumes exactly there</text>
  </g>

  <!-- state file footer -->
  <rect x="36" y="308" width="848" height="32" rx="8" fill="#0d0a18" stroke="#3f3357" stroke-width="1"/>
  <text x="54" y="329" font-size="12.5" font-family="SF Mono, Menlo, Consolas, monospace" fill="#a78bfa">.heatwave/runs/&lt;task&gt;/</text>
  <text x="238" y="329" font-size="12.5" font-family="SF Mono, Menlo, Consolas, monospace" fill="#8f86a8">← the plan, reviews, fixes and current step live here, as readable files</text>
</svg>
