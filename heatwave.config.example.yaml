# Heatwave configuration — EVERYTHING here is optional.
#
# Out of the box, with this file untouched:
#   • every role runs on the model your session already uses (one model in
#     fresh contexts satisfies the isolation rules — R-12)
#   • test tooling is auto-detected from your project by the planner
#     (package.json, pytest.ini, go.mod, playwright/cypress configs,
#      ios/ & android/ folders, CI workflows — R-99)
#
# Edit only to OVERRIDE a default. Uncomment what you need.

# --- Models per role (default: the session's model for all three) ------------
# Use different models if you want uncorrelated blind spots between roles.
# roles:
#   planner:     { preferred: your-best-reasoning-model, fallback: [] }
#   implementer: { preferred: your-best-coding-model,    fallback: [] }
#   reviewer:    { preferred: your-best-reasoning-model, fallback: [] }

# --- Test tooling (default: auto-detected from the project) ------------------
# Set an entry only when detection gets it wrong, or for tools that leave no
# trace in the repo (a load-test rig, a device farm). Never claim a tool you
# don't have — a false access claim is a Blocker (R-63).
# tooling:
#   unit: "jest"
#   integration: ""
#   web_e2e: "playwright"
#   load: "k6"

# --- Mobile apps only --------------------------------------------------------
# ios | android | both. Leave unset to be asked once at the start of each
# mobile task (R-98).
# tooling:
#   mobile_platform: "both"

# --- Iteration budgets (defaults: 3 plan / 5 fix / 2 final — §2.3) -----------
# budgets:
#   plan_iterations: 3
#   fix_iterations: 5
#   final_iterations: 2

# --- Default tier when the planner doesn't argue otherwise (§0.5) ------------
# default_tier: STANDARD
